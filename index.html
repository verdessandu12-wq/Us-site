<!DOCTYPE html>
<html lang = "en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cool input</title>
  <link rel = "stylesheet" href = "style.css">
</head>

<body>
  <div class = "container_for_all">
  <h1 id = "title">Sign in</h1>
  <div class = "container">
    <input type = "text" id = "username" class = "input_username" required autocomplete="off" maxlength="16">
    <label for = "username" class = "label_user">Numele</label>
    <span id = "span_error"></span>
</div>
    
    <div class = "container">
    <input type = "password" id = "password" class = "input_username" required autocomplete="off" maxlength="16">
    <label for = "password" class = "label_user">Parola</label>
    <span id = "span_error2"></span>
  </div>
      
    <div class = "container">
    <input type = "text" id = "email" class = "input_username" required autocomplete="off">
    <label for = "email" class = "label_user">Email</label>
    <span id = "span_error3"></span>
  </div>
      
  <button id = "gata">Gata</button>
    <h3 id = "end"></h3>
  </div>
  <script src = "main.js"></script>
</body>

</html>
